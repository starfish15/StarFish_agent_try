<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Chat</title>
  <link rel="stylesheet" href="chat_ui.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">User ↔ Agent</p>
      <h1>星辰猫猫的小窝</h1>
      <p id="uiTitle" class="ui-title"></p>
      <p id="subtitle" class="subtitle"></p>
    </header>

    <section class="panel chat-panel" aria-label="本次对话记录">
      <div id="chatLog" class="chat-log"></div>
    </section>

    <section class="panel input-panel" aria-label="输入区">

      <div class="mode-row" role="group" aria-label="回复模式">
        <span class="label mode-label">回复模式</span>
        <div class="mode-buttons" role="group" aria-label="模式按钮">
          <button type="button" class="btn btn-secondary mode-btn active" data-mode="normal" aria-pressed="true">
            对话
          </button>
          <button type="button" class="btn btn-secondary mode-btn" data-mode="inner" aria-pressed="false">
            思考
          </button>
          <button type="button" class="btn btn-secondary mode-btn" data-mode="think" aria-pressed="false">
            调试
          </button>
        </div>
        <div class="mode-actions" role="group" aria-label="人设选择">
          <button id="personaBtn" type="button" class="btn btn-secondary">选择人设</button>
          <span id="personaActive" class="persona-active"></span>
        </div>
      </div>
      <label class="label" for="userInput">你的输入</label>
      <textarea id="userInput" rows="3" placeholder="在这里输入，然后点击“发送”或按 Enter 键…"></textarea>
      <div class="controls">
        <button id="sendBtn" class="btn">发送</button>
        <button id="quitBtn" class="btn btn-secondary">退出</button>
      </div>
      <p id="status" class="status"></p>
    </section>
  </main>

  <div id="personaModal" class="modal" aria-hidden="true" role="dialog" aria-label="人设选择">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-surface" role="document">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Persona</p>
          <h2 class="modal-title">选择人设</h2>
        </div>
        <button type="button" class="btn btn-secondary modal-close" data-close="true">关闭</button>
      </div>
      <div id="personaList" class="persona-list"></div>
      <p id="personaStatus" class="status"></p>
    </div>
  </div>

  <script src="chat_ui.js"></script>
</body>
</html>
